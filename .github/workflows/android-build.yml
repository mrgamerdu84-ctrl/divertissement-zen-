name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Construire l'application web
        run: npm run build

      - name: Ajouter la plateforme Android (Capacitor)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Rendre gradlew exécutable
        run: chmod +x android/gradlew

      - name: Compiler l'APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Publier l'APK en tant qu'artefact
        uses: actions/upload-artifact@v4
        with:
          name: mon-divertissement-zen-plus-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
